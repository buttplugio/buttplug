devices:
  - identifier:
      name: "JXT002"
    expected_name: "Honey Play Box Vibrosa"
device_init:
  # Initialization: subscribe then send handshake frame (counter=0)
  - !Commands
    device_index: 0
    commands:
      - !Subscribe
        endpoint: rx
      - !Write
        endpoint: tx
        data: [ 0x02, 0xA5, 0x5A, 0x55, 0xAA, 0xF0, 0x00, 0xB1, 0x01, 0x00, 0x02, 0x00, 0x10, 0x03, 0x36, 0x86 ]
        write_with_response: true
  # Device responds with a valid BLE frame: response code 0x9000 + 16-byte random key [0x01..0x10]
  - !Events
    device_index: 0
    events:
      - !Notifications
        - endpoint: rx
          data: [ 0x02, 0xA5, 0x5A, 0x55, 0xAA, 0xF0, 0x00, 0xB1, 0x01, 0x00, 0x12, 0x90, 0x00, 0x01, 0x02, 0x03, 0x04, 0x05, 0x06, 0x07, 0x08, 0x09, 0x0A, 0x0B, 0x0C, 0x0D, 0x0E, 0x0F, 0x10, 0x03, 0xF4, 0x26 ]
device_commands:
  # Scalar 0.5 on motor 0 -> strength=50; motor 1 stays at 0; packet_id increments to 2
  - !Messages
    device_index: 0
    messages:
      - !Scalar
        - Index: 0
          Scalar: 0.5
          ActuatorType: Vibrate
  - !Commands
    device_index: 0
    commands:
      - !Write
        endpoint: tx
        data: [ 0x02, 0xA5, 0x5A, 0x55, 0xAA, 0xF0, 0x02, 0xB1, 0x03, 0x00, 0x18, 0x01, 0x00, 0x05, 0x00, 0x3C, 0x00, 0x00, 0x32, 0x11, 0x00, 0x05, 0x00, 0x3C, 0x00, 0x00, 0x00, 0x3C, 0xAB, 0x13, 0x93, 0x4E, 0x4C, 0xB8, 0x57, 0x03, 0x32, 0x91 ]
        write_with_response: true
  # Stop: JXT002 has 2 vibrate features, so 2 writes are generated (one per feature, sequentially)
  # Feature 0 stop: packet_id=3, both motors at 0
  # Feature 1 stop: packet_id=4, both motors at 0 (same payload, different counter)
  - !Messages
    device_index: 0
    messages:
      - !Stop
  - !Commands
    device_index: 0
    commands:
      - !Write
        endpoint: tx
        data: [ 0x02, 0xA5, 0x5A, 0x55, 0xAA, 0xF0, 0x03, 0xB1, 0x03, 0x00, 0x18, 0x01, 0x00, 0x05, 0x00, 0x3C, 0x00, 0x00, 0x00, 0x11, 0x00, 0x05, 0x00, 0x3C, 0x00, 0x00, 0x00, 0xF8, 0x2D, 0xC3, 0x5B, 0xD6, 0x08, 0x32, 0xE4, 0x03, 0xD6, 0x75 ]
        write_with_response: true
      - !Write
        endpoint: tx
        data: [ 0x02, 0xA5, 0x5A, 0x55, 0xAA, 0xF0, 0x04, 0xB1, 0x03, 0x00, 0x18, 0x01, 0x00, 0x05, 0x00, 0x3C, 0x00, 0x00, 0x00, 0x11, 0x00, 0x05, 0x00, 0x3C, 0x00, 0x00, 0x00, 0xF8, 0x2D, 0xC3, 0x5B, 0xD6, 0x08, 0x32, 0xE4, 0x03, 0xD6, 0x75 ]
        write_with_response: true
